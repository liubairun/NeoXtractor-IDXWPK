name: Build Workflow

on:
  workflow_call:
    inputs:
      asset_suffix:
        description: "Suffix to append to asset names"
        required: false
        default: ""
        type: string

jobs:
  build:
    name: Build on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            asset_name: NeoXtractor-IDXWPK-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version-file: ".python-version"
          architecture: ${{ matrix.arch }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.4"

      - name: Install dependencies
        shell: bash
        run: |
          export CIBUILDWHEEL=1
          uv sync --locked
          uv pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          uv run pyinstaller main.spec

      - name: Verify build output
        shell: bash
        run: |
          ls -la dist
          test -d "dist/NeoXtractor-IDXWPK"

      - name: Create archive with symlinks (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd dist/NeoXtractor-IDXWPK
          tar -czf ../${{ matrix.asset_name }}${{ inputs.asset_suffix }}.tar.gz .

      - name: Upload artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}${{ inputs.asset_suffix }}
          path: dist/${{ matrix.asset_name }}${{ inputs.asset_suffix }}.tar.gz

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}${{ inputs.asset_suffix }}
          path: dist/NeoXtractor-IDXWPK/
          compression-level: 9
